services:
  api:
    build: .
    container_name: pharmoris-api
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "pnpm prisma migrate deploy && pnpm start:dev"

  postgres:
    image: postgres:15-alpine
    container_name: pharmoris-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pharmoris
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pharmoris-redis

volumes:
  pgdata:
